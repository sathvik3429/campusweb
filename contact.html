<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - JITS Campus</title>
    <link rel="icon" type="image/png" href="hostlogo.png" />
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
</head>

<body>

    <div id="particles-js"></div>

    <nav class="navbar">
        <div class="brand">
            <img src="jits_logo1.png" alt="Logo">
            <span>JITS Campus</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="academics.html">Academics</a>
            <a href="campuslife.html">Campus Life</a>
            <a href="contact.html" class="active">Contact</a>
            <a href="Login.html"
                style="background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 20px;">Login</a>
        </div>
    </nav>

    <div class="page-container">
        <div class="glass-panel">
            <h1 class="page-title">Contact Us</h1>

            <div style="display: flex; gap: 40px; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 300px;">
                    <h2 class="section-title" style="margin-top: 0;">Get in Touch</h2>
                    <form id="contactForm" onsubmit="handleContactSubmit(event)">
                        <style>
                            .contact-input {
                                width: 100%;
                                padding: 15px;
                                background: rgba(255, 255, 255, 0.1);
                                border: 1px solid rgba(255, 255, 255, 0.1);
                                border-radius: 10px;
                                margin-bottom: 20px;
                                color: #fff;
                                outline: none;
                            }

                            .contact-input:focus {
                                border-color: #4facfe;
                            }
                        </style>
                        <input type="text" placeholder="Your Name" class="contact-input" required>
                        <input type="email" placeholder="Your Email" class="contact-input" required>
                        <textarea rows="5" placeholder="Message" class="contact-input" required></textarea>
                        <button type="submit" class="submit-btn" style="width: auto; padding: 12px 30px;">Send
                            Message</button>
                    </form>
                    <script>
                        function handleContactSubmit(event) {
                            event.preventDefault();

                            const name = document.querySelector('input[type="text"]').value;
                            const email = document.querySelector('input[type="email"]').value;
                            const message = document.querySelector('textarea').value;
                            const date = new Date().toLocaleString();

                            const newMessage = { name, email, message, date };

                            // Get existing messages or initialize empty array
                            const messages = JSON.parse(localStorage.getItem('contactMessages') || "[]");
                            messages.push(newMessage);
                            localStorage.setItem('contactMessages', JSON.stringify(messages));

                            alert('Message Sent Successfully!');
                            document.getElementById('contactForm').reset();
                        }
                    </script>
                </div>

                <div style="flex: 1; min-width: 300px;">
                    <h2 class="section-title" style="margin-top: 0;">Address</h2>
                    <p class="content-text">
                        <strong>Jyothishmathi Institute of Technological Sciences </strong><br>
                        Thimmapur,Karimnagar,<br>
                        Telangana, India - 505527
                    </p>
                    <p class="content-text">
                        <strong>Email:</strong> info@jits.in<br>
                        <strong>Phone:</strong> +91 9177553535
                    </p>
                    <div style="width: 100%; height: 250px; border-radius: 12px; overflow: hidden; margin-top: 20px;">
                        <iframe width="100%" height="100%"
                            src="https://maps.google.com/maps?q=Jyothishmathi%20Institute%20of%20Technological%20Sciences&t=&z=13&ie=UTF8&iwloc=&output=embed"
                            frameborder="0" scrolling="no" marginheight="0" marginwidth="0" style="border:0;"
                            allowfullscreen="" loading="lazy">
                        </iframe>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <footer>
        &copy; 2024 JITS Campus Management System. All rights reserved.
    </footer>

    <script>
        /* Particles Config */
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "opacity": { "value": 0.2, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "repulse" } }
            }
        });
    </script>
</body>

</html>
