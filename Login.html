<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - JITS</title>
  <link rel="icon" type="image/png" href="hostlogo.png" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #0f2027;
      background: linear-gradient(to right, #2c5364, #203a43, #0f2027);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Particle background */
    #particles-js {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* Floating 27 Years Logo */
    .floating-logo {
      position: fixed;
      top: 30px;
      right: 30px;
      width: 100px;
      z-index: 10;
      animation: float 6s ease-in-out infinite;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    /* Main Container */
    .login-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    /* Glassmorphism Box */
    .login-box {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      text-align: center;
      transition: transform 0.3s ease;
      animation: slideInLeft 0.8s ease-out;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-100px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideOutLeft {
      to {
        opacity: 0;
        transform: translateX(-100px);
      }
    }

    .slide-out-left {
      animation: slideOutLeft 0.5s forwards;
    }

    .logo-area {
      margin-bottom: 30px;
    }

    .logo-area img {
      max-width: 180px;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.3));
    }

    h2 {
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    /* Inputs */
    .input-group {
      margin-bottom: 25px;
      text-align: left;
    }

    .input-field {
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-field::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .input-field:focus {
      background: rgba(255, 255, 255, 0.12);
      border-color: #4facfe;
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
      transform: translateY(-2px);
    }

    /* OTP Inputs */
    .otp-section {
      margin-bottom: 30px;
    }

    .otp-label {
      display: block;
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
      text-align: left;
    }

    .otp-container {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .otp-digit {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 24px;
      text-align: center;
      transition: all 0.3s;
      outline: none;
    }

    .otp-digit:focus {
      border-color: #00f2fe;
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
      transform: scale(1.1);
    }

    /* Login Button */
    .login-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      background: transparent;
      transition: 0.3s;
      z-index: 1;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 300%;
      height: 100%;
      background: linear-gradient(90deg,
          #2196f3, #00f2fe, #2196f3, #00f2fe);
      transition: all 0.5s ease;
      z-index: -1;
      background-size: 200% auto;
      animation: glowing 3s linear infinite;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(0, 242, 254, 0.6);
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
    }

    @keyframes glowing {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Links */
    .auth-link {
      margin-top: 20px;
      display: block;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .auth-link:hover {
      color: #fff;
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .login-box {
        padding: 25px;
      }

      .otp-digit {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <!-- Background Particles -->
  <div id="particles-js"></div>

  <!-- Animated Logo -->
  <img src="27-years-logo.png" alt="27 Years" class="floating-logo" />

  <div class="login-container">
    <div class="login-box">

      <div class="logo-area">
        <!-- Using a white version of logo if available, or filter -->
        <img src="jits_logo1.png" alt="JITS Campus"
          style="background: rgba(255,255,255,0.9); padding: 5px; border-radius: 8px;">
      </div>

      <h2>Welcome Back</h2>

      <form onsubmit="handleLogin(event)">
        <div class="input-group">
          <input type="text" id="email" class="input-field" placeholder="Staff ID" required autocomplete="off" />
        </div>

        <div class="otp-section">
          <label class="otp-label">Password PIN</label>
          <div class="otp-container">
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
            <input type="text" class="otp-digit" maxlength="1" inputmode="numeric">
          </div>
          <input type="hidden" id="password">
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          Login
        </button>
      </form>

      <a href="signup.html" class="auth-link" onclick="navigateToSignup(event)">New user? Create an account</a>

    </div>
  </div>

  <script>
    function navigateToSignup(e) {
      e.preventDefault();
      const box = document.querySelector('.login-box');
      box.classList.add('slide-out-left');
      setTimeout(() => {
        window.location.href = 'signup.html';
      }, 500);
    }

    function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;

      // Collect PIN
      const digits = document.querySelectorAll('.otp-digit');
      let password = '';
      digits.forEach(d => password += d.value);

      if (password.length < 4) {
        alert("Please enter your complete 4-digit PIN");
        return;
      }

      const users = JSON.parse(localStorage.getItem("users") || "[]");
      const user = users.find(u => u.email === email && u.password === password);

      const btn = document.getElementById('loginBtn');

      if (!user) {
        // Shake animation for error
        const box = document.querySelector('.login-box');
        box.style.transform = "translateX(10px)";
        setTimeout(() => box.style.transform = "translateX(-10px)", 100);
        setTimeout(() => box.style.transform = "translateX(0)", 200);

        alert("Invalid ID or Password");
        return;
      }

      // Success
      btn.innerHTML = "Verifying...";
      localStorage.setItem("loggedInUser", JSON.stringify(user));

      setTimeout(() => {
        // Redirect based on role
        switch (user.role) {
          case "Teacher":
            window.location.href = "dashboard_teacher.html";
            break;
          case "HOD":
            window.location.href = "hod.html";
            break;
          case "Admin":
            window.location.href = "admin_messages.html";
            break;
          default:
            alert("Role not recognized.");
            btn.innerHTML = "LOGIN";
        }
      }, 800);
    }

    /* OTP Logic */
    const inputs = document.querySelectorAll('.otp-digit');
    inputs.forEach((input, index) => {
      // Auto-focus next
      input.addEventListener('input', function () {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value.length >= 1) {
          if (index < inputs.length - 1) inputs[index + 1].focus();
        }
      });

      // Backspace nav
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Backspace' && !this.value) {
          if (index > 0) inputs[index - 1].focus();
        }
      });

      // Masking effect
      input.addEventListener('blur', function () {
        if (this.value) this.type = 'password';
      });

      input.addEventListener('focus', function () {
        this.type = 'text';
      });
    });

    /* Particles Config */
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": { "value": 0.3, "random": true },
        "size": { "value": 3, "random": true },
        "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2, "width": 1 },
        "move": { "enable": true, "speed": 1, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": { "onhover": { "enable": true, "mode": "bubble" }, "onclick": { "enable": true, "mode": "push" } },
        "modes": { "bubble": { "distance": 200, "size": 6, "duration": 2, "opacity": 0.8 } }
      },
      "retina_detect": true
    });
  </script>

  <!-- Chatbot Integration -->
  <script src="chatbot.js"></script>

</body>

</html>
